  <!-- OGP / Twitter Card -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="maijun の技術質問ノート">
  <meta property="og:title" content="OCI の記事 | maijun の技術質問ノート">

<body>
  <header class="site-header">
    <a class="site-title" href="index.html">maijun の技術質問ノート</a>
    <nav><a href="search.html">検索</a> <a href="https://maijun.net" rel="me">maijun.net</a></nav>
  </header>

  <main>
    <section class="category cat-oci">
      <h2><span class="cat-mark">OCI</span>Oracle Cloud Infrastructure</h2>
      <ul class="entries" id="entries"></ul>
      <noscript>
        <p class="notice">記事一覧の表示には JavaScript が必要です。
          <a href="index.html">トップページ</a>に戻るか、サイト内検索をご利用ください。</p>
      </noscript>
    </section>

    <a class="back-link" href="index.html">← 目次に戻る</a>
  </main>

  <footer class="site-footer">
    <p>© maijun — <a href="https://maijun.net">maijun.net</a> / このノートは Claude Code で生成・運用しています。</p>
  </footer>

  <script>
    // notes.json を単一の真実源とし、自カテゴリの記事を date 降順で全件表示する
    const CATEGORY = 'oci';
    fetch('/notes.json')
      .then(r => r.json())
      .then(notes => {
        const list = notes
          .filter(n => n.category === CATEGORY)
          .sort((a, b) => b.date.localeCompare(a.date));
        document.getElementById('entries').innerHTML = list.map(n =>
          `<li><a class="entry" href="/${n.path}"><span class="entry-title">${n.title}</span><span class="leader"></span><time datetime="${n.date}">${n.date}</time></a></li>`
        ).join('');
      })
      .catch(() => {
        document.getElementById('entries').innerHTML =
          '<li class="notice">記事一覧を読み込めませんでした。</li>';
      });
  </script>
</body>
</html>
